<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content='width=device-width, initial-scale=1.0,text/html,charset=utf-8'>

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
  <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
  <link href="css/scorad.css" rel="stylesheet">
  <link href="css/salt.css" rel="stylesheet">

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTY" crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

  <title>SALT</title>
  <script type="text/javascript">
    scorad_blatt = 0;
  </script>

</head>
<body class="salt background">
  <div class="container">
    <div id="header-top" class="container row justify-content-md-center">
      <div class="col-lg-12">
        <div style="width:100%; float:left;">
          <a class="back" onclick="location.href='index.html' + queryString" ><img src="img/back.png"/></a>
          <h1 class="title_page">SALT</h1>
        </div>
        <span id="mild_result" class="black">结果：</span><span id="mild_result2"> (0 - 100)</span>
        <div class="result-block">
          <a id="resultme" class="btn btn-scorad">计算</a>
          <a id="closeresult" class="btn-result">X</a>
        </div>
      </div>
    </div>
    <div class="row justify-content-md-center" style="padding-top: 94px;">
      <div class="col col-lg-1">
      </div>
      <div class="col-lg-10 questions background">
        <p id="beschreibung_salt" style="padding-top: 20px;font-weight: bold">请在下方图像中选择每个头皮区域的脱发百分比。</p>

        <div id="salt-selector" class="salt-selector">
          <div class="salt-region-item">
            <div class="region-header">
              <div class="region-image-container">
                <div style="background-image:url('img/枕叶 (24%).png'); background-size: cover" class="region-thumbnail"
                     rel="img/枕叶 (24%).png"></div>
                <div class="middle lupa"><a><img src="img/lupa.svg" /></a></div>
              </div>
              <h4 id="salt_occipital_title" class="black_title">枕叶 (24%)</h4>
            </div>
            <div class="salt-slider-container">
              <div id="occipital-slider" class="selector" data-max="24" data-region="occipital"></div>
              <div class="slider-value" id="occipital-value">0%</div>
            </div>
          </div>

          <div class="salt-region-item">
            <div class="region-header">
              <div class="region-image-container">
                <div style="background-image:url('img/左侧颞叶 (18%).png'); background-size: cover" class="region-thumbnail"
                     rel="img/左侧颞叶 (18%).png"></div>
                <div class="middle lupa"><a><img src="img/lupa.svg" /></a></div>
              </div>
              <h4 id="salt_left_temporal_title" class="black_title">左侧颞叶 (18%)</h4>
            </div>
            <div class="salt-slider-container">
              <div id="left_temporal-slider" class="selector" data-max="18" data-region="left_temporal"></div>
              <div class="slider-value" id="left_temporal-value">0%</div>
            </div>
          </div>

          <div class="salt-region-item">
            <div class="region-header">
              <div class="region-image-container">
                <div style="background-image:url('img/右侧颞叶 (18%).png'); background-size: cover" class="region-thumbnail"
                     rel="img/右侧颞叶 (18%).png"></div>
                <div class="middle lupa"><a><img src="img/lupa.svg" /></a></div>
              </div>
              <h4 id="salt_right_temporal_title" class="black_title">右侧颞叶 (18%)</h4>
            </div>
            <div class="salt-slider-container">
              <div id="right_temporal-slider" class="selector" data-max="18" data-region="right_temporal"></div>
              <div class="slider-value" id="right_temporal-value">0%</div>
            </div>
          </div>

          <div class="salt-region-item">
            <div class="region-header">
              <div class="region-image-container">
                <div style="background-image:url('img/头顶 (40%).png'); background-size: cover" class="region-thumbnail"
                     rel="img/头顶 (40%).png"></div>
                <div class="middle lupa"><a><img src="img/lupa.svg" /></a></div>
              </div>
              <h4 id="salt_vertex_title" class="black_title">头顶 (40%)</h4>
            </div>
            <div class="salt-slider-container">
              <div id="vertex-slider" class="selector" data-max="40" data-region="vertex"></div>
              <div class="slider-value" id="vertex-value">0%</div>
            </div>
          </div>
        </div>

      </div>
      <div class="col col-lg-1">
      </div>
    </div>
  </div>

  <script src="js/language.js"></script>
  <!--<script>
    document.write(`<script src="js/languages/${sprache}.js"><\/script>`);
  </script>-->
  <script src="js/language_settings.js"></script>

  <script type="text/javascript">
    if (i18n[sprache]["country"] == 'fr' || i18n[sprache]["country"] == 'cl' || i18n[sprache]["country"] == 'ar') {
      document.write('<link rel="stylesheet" type="text/css" href="/css/scorad_fr.css" />');
    }
  </script>

  <script src="js/cookie.js"></script>
  <script src="js/beans/salt.js"></script>
  <script src="js/scorad_gral.js"></script>
  <script src="js/salt_calc.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fancyapps/fancybox@3.5.2/dist/jquery.fancybox.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/fancyapps/fancybox@3.5.2/dist/jquery.fancybox.min.js"></script>

  <script type="text/javascript">

    $(document).ready(() => {

      $(".title_page").html(i18n[sprache]["salt_title"]);

    })

  </script>
</body>
</html>
